services:

  plant_api:
    build: .
    command: uvicorn src.api.service:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true

  nlp_api:
      build: .
      command: uvicorn src.api.nlp_service:app --host 0.0.0.0 --port 8001
      ports:
        - "8001:8001"
      volumes:
        - .:/app
      env_file:
        - .env
      environment:
        - RUNNING_IN_DOCKER=true

  frontend:
    build: .
    command: streamlit run src/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - plant_api
      - nlp_api